          {{ else }}
            defaults write com.apple.TextEdit "RichText" -bool "{{ .Input.mode }}" && killall TextEdit
          {{ end }}
      smartquotes:
        description: |
          Set if quotation marks should be converted from neutral form to opening/closing variants.
        inputs:
          mode:
            type: string
            default: "true"
            options:
              Enable: "true"
              Disable: "false"
              Reset: "reset"
        run: |
          {{ if (eq .Input.mode "reset") }}
            defaults delete com.apple.TextEdit "SmartQuotes" && killall TextEdit
          {{ else }}
            defaults write com.apple.TextEdit "SmartQuotes" -bool "{{ .Input.mode }}" && killall TextEdit
          {{ end }}
  timemachine:
    description: |
      The Time Machine feature allows simple, regular backups of your filesystem.
    commands:
      donotoffernewdisksforbackup:
        description: |
          Prevent Time Machine from prompting to use newly connected storage as backup volumes.
        inputs:
          mode:
            type: string
            default: "false"
            options:
              Enable: "true"
              Disable: "false"
              Reset: "reset"
        run: |
          {{ if (eq .Input.mode "reset") }}
            defaults delete com.apple.TimeMachine "DoNotOfferNewDisksForBackup"
          {{ else }}
            defaults write com.apple.TimeMachine "DoNotOfferNewDisksForBackup" -bool "{{ .Input.mode }}"
          {{ end }}
  trackpad:
    description: |
      The trackpad is hardware to control the cursor that comes on all MacBooks.
    commands:
      dragging:
        description: |
          Mutually exclusive with `DragLock` and `TrackpadThreeFingerDrag`.
        inputs:
          mode:
            type: string
            default: "false"
            options:
              Enable: "true"
              Disable: "false"
              Reset: "reset"
        run: |
          {{ if (eq .Input.mode "reset") }}
            defaults delete com.apple.AppleMultitouchTrackpad "Dragging"
          {{ else }}
            defaults write com.apple.AppleMultitouchTrackpad "Dragging" -bool "{{ .Input.mode }}"
          {{ end }}
      draglock:
        description: |
          Mutually exclusive with `Dragging` and `TrackpadThreeFingerDrag`.
        inputs:
          mode:
            type: string
            default: "false"
            options:
              Enable: "true"
              Disable: "false"
              Reset: "reset"
        run: |
          {{ if (eq .Input.mode "reset") }}
            defaults delete com.apple.AppleMultitouchTrackpad "DragLock"
          {{ else }}
            defaults write com.apple.AppleMultitouchTrackpad "DragLock" -bool "{{ .Input.mode }}"
          {{ end }}
      firstclickthreshold:
        description: |
          Choose between Light/Medium/Firm.
        inputs:
          threshold:
            type: number
            default: 1
        run: |
          {{ if (eq .Input.threshold 1) }}
            defaults delete com.apple.AppleMultitouchTrackpad "FirstClickThreshold"
          {{ else }}
            defaults write com.apple.AppleMultitouchTrackpad "FirstClickThreshold" -int "{{ .Input.threshold }}"
          {{ end }}
      trackpadthreefingerdrag:
        description: |
          Mutually exclusive with `Dragging` and `DragLock`.
        inputs:
          mode:
            type: string
            default: "false"
            options:
              Enable: "true"
              Disable: "false"
              Reset: "reset"
        run: |
          {{ if (eq .Input.mode "reset") }}
            defaults delete com.apple.AppleMultitouchTrackpad "TrackpadThreeFingerDrag"
          {{ else }}
            defaults write com.apple.AppleMultitouchTrackpad "TrackpadThreeFingerDrag" -bool "{{ .Input.mode }}"
          {{ end }}
  xcode:
    description: |
      Xcode is an integrated development environment for macOS containing a suite of software development tools developed by Apple for developing software for macOS, iOS, iPadOS, watchOS, and tvOS.
    commands:
      ideadditionalcounterpartsuffixes:
        description: |
          Add additional counterpart suffixes that Xcode should consider in the "Related Items > Counterparts" menu.
        inputs:
          mode:
            type: string
            options:
              "Add \"ViewModel\" and \"View\"": "\"ViewModel\" \"View\""
              "Add \"Router\", \"Interactor\" and \"Builder\"": "\"Router\" \"Interactor\" \"Builder\""
              Reset: "reset"
        run: |
          {{ if (eq .Input.mode "reset") }}
            defaults delete com.apple.dt.Xcode "IDEAdditionalCounterpartSuffixes" && killall Xcode
          {{ else }}
            defaults write com.apple.dt.Xcode "IDEAdditionalCounterpartSuffixes" -array-add {{ .Input.mode }} && killall Xcode
          {{ end }}
      showbuildoperationduration:
        description: |
          Show build durations in the Activity Viewer in Xcode's toolbar at the top of the workspace window.
        inputs:
          mode:
            type: string
            default: "false"
            options:
              Enable: "true"
              Disable: "false"
              Reset: "reset"
        run: |
          {{ if (eq .Input.mode "reset") }}
            defaults delete com.apple.dt.Xcode "ShowBuildOperationDuration" && killall Xcode
          {{ else }}
            defaults write com.apple.dt.Xcode "ShowBuildOperationDuration" -bool "{{ .Input.mode }}" && killall Xcode
          {{ end }}
